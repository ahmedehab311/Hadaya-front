kind = "web"
previewPath = "/"
title = "Hadaya — Gift Platform"
version = "1.0.0"
id = "artifacts/hadaya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19548

[services.development]
run = "pnpm --filter @workspace/hadaya run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hadaya", "run", "build" ]
publicDir = "artifacts/hadaya/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19548"
BASE_PATH = "/"
